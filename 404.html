<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>404 - Page Not Found | Adam Simms</title>
    <meta name="description" content="The page you're looking for doesn't exist." />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#ff4f00" />

    <!-- Stylesheets -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="css/normalize.css" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..600;1,14..32,400..600&family=JetBrains+Mono:ital,wght@0,400..600;1,400..600&family=Outfit:wght@400..600&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link href="images/favicon.ico" rel="shortcut icon" type="image/x-icon" />
    <link href="images/webclip.png" rel="apple-touch-icon" />

    <style>
      .error-container {
        position: relative;
        left: auto;
        text-align: left;
        min-height: 80vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        max-width: var(--measure);
      }

      .error-code {
        margin: 0 0 var(--space-2);
        font-family: var(--font-heading);
        font-size: clamp(4.5rem, 12vw, 7.5rem);
        font-weight: var(--weight-medium);
        line-height: var(--leading-tight);
        letter-spacing: var(--tracking-display);
        color: var(--color-primary);
      }

      .error-message {
        margin: 0 0 var(--space-4);
        font-family: var(--font-heading);
        font-size: var(--font-size-display);
        font-weight: var(--weight-medium);
        line-height: var(--leading-tight);
        letter-spacing: var(--tracking-heading);
      }

      .error-description {
        margin-bottom: var(--space-5);
      }

      .home-button {
        display: inline-block;
        width: fit-content;
        padding: 0.72em 1.35em;
        background-color: var(--color-primary);
        color: var(--color-background);
        font-family: var(--font-sans);
        font-size: var(--font-size-sm);
        font-weight: var(--weight-semibold);
        line-height: var(--leading-small);
        letter-spacing: var(--tracking-small);
        text-decoration: none;
        border-radius: 2px;
        transition: background-color 0.15s ease;
      }

      .home-button:hover {
        background-color: #e64500;
      }

      .error-links {
        margin-top: var(--space-7);
      }

      @media screen and (width <= 479px) {
        .error-code {
          font-size: clamp(3.5rem, 18vw, 5rem);
        }
      }
    </style>
  </head>
  <body class="body">
    <div class="container">
      <div class="error-container">
        <div class="error-code" role="heading" aria-level="1">404</div>
        <h1 class="error-message">Page Not Found</h1>
        <p class="paragraph error-description">
          The page you're looking for doesn't exist or has been moved. Let's get you back on track.
        </p>
        <a href="/" class="home-button" aria-label="Return to homepage">Back to Home</a>

        <div class="error-links">
          <p class="small">Looking for something specific? Here are some helpful links:</p>
          <nav aria-label="Quick navigation links" class="footer-links">
            <a
              href="https://www.linkedin.com/in/adamsimms"
              target="_blank"
              rel="noopener noreferrer"
              class="link small"
              aria-label="Connect with Adam on LinkedIn"
              >LinkedIn</a
            >
            ·
            <a
              href="https://instagram.com/adamsimms"
              target="_blank"
              rel="noopener noreferrer"
              class="link small"
              aria-label="Follow Adam on Instagram"
              >Instagram</a
            >
            ·
            <a
              href="https://github.com/adamsimms"
              target="_blank"
              rel="noopener noreferrer"
              class="link small"
              aria-label="View Adam on GitHub"
              >GitHub</a
            >
            ·
            <a
              href="https://cal.com/adam-simms-ivi9mt/1-hour-meeting"
              target="_blank"
              rel="noopener noreferrer"
              class="link small"
              aria-label="Meet with Adam"
              >Meet</a
            >
          </nav>
        </div>
      </div>
    </div>
  </body>
</html>
