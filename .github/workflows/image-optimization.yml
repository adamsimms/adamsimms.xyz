name: Image Optimization

on:
  push:
    paths:
      - 'img/**'
  workflow_dispatch:

jobs:
  optimize-images:
    name: Optimize Images
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install image optimization tools
      run: |
        npm install -g @squoosh/cli
        
    - name: Optimize PNG images
      run: |
        for file in img/*.png; do
          if [ -f "$file" ]; then
            npx @squoosh/cli --webp auto --output-dir img/ "$file"
          fi
        done
        
    - name: Optimize JPEG images
      run: |
        for file in img/*.jpg img/*.jpeg; do
          if [ -f "$file" ]; then
            npx @squoosh/cli --mozjpeg auto --output-dir img/ "$file"
          fi
        done
        
    - name: Commit optimized images
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add img/
        git diff --quiet && git diff --staged --quiet || git commit -m "chore: optimize images"
        git push
